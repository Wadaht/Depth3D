name: Build Depth3D IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode_16.0.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app | head -1)"
          xcodebuild -version
          # Install iOS simulator runtime to fix actool errors
          xcodebuild -downloadPlatform iOS || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          mkdir -p build
          xcodebuild build \
            -project Depth3D.xcodeproj \
            -scheme Depth3D \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build/build_log.txt || true
          # Write errors to job summary
          echo "## Build Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "(error:|BUILD SUCCEEDED|BUILD FAILED)" build/build_log.txt | head -80 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Fail if build failed
          if grep -q "BUILD FAILED\|** BUILD FAILED **" build/build_log.txt; then exit 1; fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build_log.txt
          retention-days: 7

      - name: Create IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "Depth3D.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r Depth3D.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Depth3D-IPA
          path: build/Depth3D.ipa
          retention-days: 30
