name: Build Depth3D IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode_16.0.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app | head -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive
        run: |
          xcodebuild archive \
            -project Depth3D.xcodeproj \
            -scheme Depth3D \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/Depth3D.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ARCHS=arm64 \
            SKIP_INSTALL=NO \
            2>&1 | tee build/build_log.txt || true
          # Write errors to job summary
          echo "## Build Errors" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "(error:|warning:|fatal)" build/build_log.txt | head -80 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Fail if there were errors
          if grep -q "BUILD FAILED\|** ARCHIVE FAILED **" build/build_log.txt; then exit 1; fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build_log.txt
          retention-days: 7

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/Depth3D.xcarchive/Products/Applications/Depth3D.app build/Payload/
          cd build && zip -r Depth3D.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Depth3D-IPA
          path: build/Depth3D.ipa
          retention-days: 30
