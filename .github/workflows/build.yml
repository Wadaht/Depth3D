name: Build Depth3D IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive
        run: |
          xcodebuild archive \
            -project Depth3D.xcodeproj \
            -scheme Depth3D \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/Depth3D.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/Depth3D.xcarchive/Products/Applications/Depth3D.app build/Payload/
          cd build && zip -r Depth3D.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Depth3D-IPA
          path: build/Depth3D.ipa
          retention-days: 30
