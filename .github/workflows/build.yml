name: Build Depth3D IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode_16.0.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app | head -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for device
        run: |
          mkdir -p build
          xcodebuild clean build \
            -project Depth3D.xcodeproj \
            -scheme Depth3D \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            VALID_ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_PREVIEWS=NO \
            2>&1 | tee build/build_log.txt

          # Show what was built
          echo "## Built products:" >> $GITHUB_STEP_SUMMARY
          find build/DerivedData/Build/Products -name "*.app" -type d >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo "" >> $GITHUB_STEP_SUMMARY

          # Show app contents
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -name "Depth3D.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "App contents:" >> $GITHUB_STEP_SUMMARY
            ls -la "$APP_PATH/" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build_log.txt
          retention-days: 7

      - name: Create IPA
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -name "Depth3D.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            find build/DerivedData/Build/Products -type d -name "*.app"
            exit 1
          fi
          echo "Packaging: $APP_PATH"
          ls -la "$APP_PATH/"

          # Verify executable exists
          if [ ! -f "$APP_PATH/Depth3D" ]; then
            echo "ERROR: No executable found in .app bundle!"
            exit 1
          fi

          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r Depth3D.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Depth3D-IPA
          path: build/Depth3D.ipa
          retention-days: 30
