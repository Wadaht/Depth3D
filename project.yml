name: Depth3D
options:
  bundleIdPrefix: com.depth3d
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  Depth3D:
    type: application
    platform: iOS
    sources:
      - path: Depth3D
    settings:
      base:
        INFOPLIST_FILE: Depth3D/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.depth3d.scanner
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: Depth3D/Depth3D.entitlements
